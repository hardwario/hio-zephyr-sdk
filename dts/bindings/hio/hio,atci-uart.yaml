# hio,atci-uart.yaml
compatible: "hio,atci-uart"
include: base.yaml

description: HIO ATCI UART backend node that references an existing UART device.

properties:
  uart:
    type: phandle
    required: true
    description: Reference to the UART device used by the ATCI backend

  detect-gpios:
    type: phandle-array
    required: false
    description: Optional GPIO input for detecting external enable signal (e.g. USB detect)

  enable-gpios:
    type: phandle-array
    required: false
    description: Optional GPIO output to enable/disable hardware (e.g. USB-UART bridge power)
