CONFIG_ZTEST=y
CONFIG_MAIN_STACK_SIZE=16384

CONFIG_LOG=y

CONFIG_REQUIRES_FULL_LIBC=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# hio_config deps (manual compile).
CONFIG_EVENTS=y
CONFIG_REBOOT=y
CONFIG_HIO_UTIL=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NONE=y
CONFIG_SETTINGS_RUNTIME=y

# hio_cloud_msg deps: buffers, CBOR, SHA-256 (TinyCrypt branch is selected
# because no CONFIG_HIO_CLOUD_HASH_* macro is defined in manual compile).
CONFIG_HIO_BUF=y
CONFIG_ZCBOR=y
CONFIG_ZCBOR_STOP_ON_ERROR=y
CONFIG_TINYCRYPT=y
CONFIG_TINYCRYPT_SHA256=y

# Dummy shell: oracle for the pack_config parity test. Shell log backend off
# so deferred log flushes cannot pollute the dummy capture.
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_DUMMY=y
CONFIG_SHELL_BACKEND_DUMMY_BUF_SIZE=16384
CONFIG_SHELL_LOG_BACKEND=n
