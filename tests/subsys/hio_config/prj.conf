CONFIG_ZTEST=y
CONFIG_MAIN_STACK_SIZE=8192

CONFIG_LOG=y

# Full libc + FP for snprintf ("%.2f") used by the config formatter.
CONFIG_REQUIRES_FULL_LIBC=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# hio_config dependencies (subsystem compiled manually, so its Kconfig
# `select`s do not apply and the needed options are set here).
CONFIG_EVENTS=y
CONFIG_REBOOT=y
CONFIG_HIO_UTIL=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NONE=y
CONFIG_SETTINGS_RUNTIME=y

# Shell with dummy backend for the parity test (Task 3). The shell log
# backend is disabled so deferred log flushes cannot pollute the dummy
# capture between clear_output() and get_output() (production HIO_SHELL
# disables it too).
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_DUMMY=y
CONFIG_SHELL_BACKEND_DUMMY_BUF_SIZE=16384
CONFIG_SHELL_LOG_BACKEND=n
