CONFIG_ZTEST=y
CONFIG_MAIN_STACK_SIZE=4096

# Logging in deferred mode is required by the ATCI log backend macros that the
# subsystem instantiates via HIO_ATCI_DEFINE.
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y

# Full libc + FP for snprintf/cbprintf used by the ATCI printf helpers.
CONFIG_REQUIRES_FULL_LIBC=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# k_event is used by the ATCI core thread loop and the log backend.
CONFIG_EVENTS=y

# Build the ATCI subsystem from the west module (sources + iterable-section
# linker snippet are pulled in by the module's CMake/Kconfig).
CONFIG_HIO_ATCI=y

# Default to plain "\r\n" line endings; CRC tests switch modes at runtime.
CONFIG_HIO_ATCI_CRC_MODE_DISABLED=y

# Silence the hio_atci log modules at compile time. The DEFINE macro always
# wires an ATCI log backend and the core thread enables it; with the module log
# level OFF no LOG_x records are produced, so no "@LOG:" lines can leak into the
# TX capture during tests. (We also init with log_level=0 / log_backend=false.)
CONFIG_HIO_ATCI_LOG_LEVEL_OFF=y

# Keep the optional/heavy command modules and the UART backend out of the
# build: REBOOT pulls in HIO_SYS, SHELL pulls in the shell subsystem, and the
# UART backend selects SERIAL/GPIO/PM_DEVICE and has no devicetree node on
# native_posix. We provide our own mock backend and test commands instead.
CONFIG_HIO_ATCI_CMD_REBOOT=n
CONFIG_HIO_ATCI_CMD_SHELL=n
CONFIG_HIO_ATCI_CMD_FW=n
CONFIG_HIO_ATCI_LOGIN=n
CONFIG_HIO_ATCI_BACKEND_UART=n
